services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pinory
      POSTGRES_USER: pinory
      POSTGRES_PASSWORD: pinory
    ports: ["5432:5432"]
    volumes: [pinory_postgres:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinory -d pinory"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pinory
      MINIO_ROOT_PASSWORD: pinory-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: [pinory_minio:/data]
volumes:
  pinory_postgres:
  pinory_minio:
