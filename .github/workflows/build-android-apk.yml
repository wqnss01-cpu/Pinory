name: Build Pinory Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build and sync Android project
        run: npm run build:android

      - name: Build installable APK
        working-directory: apps/miniapp/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare artifact
        run: cp apps/miniapp/android/app/build/outputs/apk/debug/app-debug.apk Pinory-1.1.0-alpha.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pinory-Android-APK
          path: Pinory-1.1.0-alpha.apk
          if-no-files-found: error
          retention-days: 30
